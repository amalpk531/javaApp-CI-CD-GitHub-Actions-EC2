name: Build and Deploy

on:
  push:
    branches: [main]

# Required for OIDC token request 
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}  
  ECR_REPOSITORY: ${{ secrets.REPOSITORY }}                     
  EC2_HOST: ${{ secrets.EC2_HOST }}        
  EC2_USER: ${{ secrets.EC2_USER}}              

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Run tests ──────────────────────────────────────────
      - name: Run tests
        working-directory: task-api
        run: mvn test

      # ── 4. Authenticate to AWS via OIDC (no long-lived keys) ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}   # IAM role ARN
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 5. Log in to Amazon ECR ───────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6. Build Docker image and push to ECR ─────────────────
      - name: Build and push Docker image
        working-directory: task-api
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Also tag as latest
          docker tag $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          # Save full image URI for deploy step
          echo "IMAGE=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV



      # ── 7. Confirm deployment ─────────────────────────────────
      - name: Deployment successful
        run: echo "Deployed ${{ github.sha }} to EC2 successfully"
